version: "3.9"

services:
  triage-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: medicaltriage:latest
    container_name: medicaltriage-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

spec_version: 1
name: criticalops-triage-env

type: space
runtime: fastapi
app: triage_env.server.app:app
port: 8000

description: >
  A real-world OpenEnv environment simulating combined medical and military triage scenarios.
  Agents must prioritize patients, allocate limited resources, and make high-stakes decisions
  to maximize survival and health outcomes.

tasks:
  - id: task1
    name: Baseline triage
    enabled: true
    grader: graders.task1_grader:Task1Grader
    graders:
      - type: class
        name: default
        path: graders.task1_grader:Task1Grader
  - id: task2
    name: Moderate pressure triage
    enabled: true
    grader: graders.task2_grader:Task2Grader
    graders:
      - type: class
        name: default
        path: graders.task2_grader:Task2Grader
  - id: task3
    name: High pressure triage
    enabled: true
    grader: graders.task3_grader:Task3Grader
    graders:
      - type: class
        name: default
        path: graders.task3_grader:Task3Grader

graders:
  task1: graders.task1_grader:Task1Grader
  task2: graders.task2_grader:Task2Grader
  task3: graders.task3_grader:Task3Grader

tags:
  - openenv
  - triage
  - healthcare
  - military
  - decision-making


